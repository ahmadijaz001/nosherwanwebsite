name: Deploy to PythonAnywhere

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload files to PythonAnywhere
        env:
          PA_TOKEN: ${{ secrets.PA_API_TOKEN }}
          PA_USER: ${{ secrets.PA_USERNAME }}
        run: |
          BASE="https://www.pythonanywhere.com/api/v0/user/${PA_USER}/files/path/home/${PA_USER}/nosherwanwebsite"

          upload() {
            local file=$1
            echo "Uploading $file ..."
            STATUS=$(curl -s -o response.txt -w "%{http_code}" -X PUT \
              -H "Authorization: Token ${PA_TOKEN}" \
              -F "content=@${file}" \
              "${BASE}/${file}")
            echo "  HTTP $STATUS"
            if [ "$STATUS" != "200" ] && [ "$STATUS" != "201" ]; then
              echo "  ERROR: $(cat response.txt)"
              exit 1
            fi
          }

          upload "server.py"
          upload "wsgi.py"
          upload "requirements.txt"
          upload "static/index.html"
          upload "static/admin.html"

          echo "All files uploaded successfully"

      - name: Reload web app
        env:
          PA_TOKEN: ${{ secrets.PA_API_TOKEN }}
          PA_USER: ${{ secrets.PA_USERNAME }}
        run: |
          echo "Reloading web app..."
          STATUS=$(curl -s -o response.txt -w "%{http_code}" -X POST \
            -H "Authorization: Token ${PA_TOKEN}" \
            "https://www.pythonanywhere.com/api/v0/user/${PA_USER}/webapps/${PA_USER}.pythonanywhere.com/reload/")
          echo "Reload HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Reload failed: $(cat response.txt)"
            exit 1
          fi
          echo "Web app reloaded successfully"

      - name: Health check
        env:
          PA_USER: ${{ secrets.PA_USERNAME }}
        run: |
          echo "Waiting for app to start..."
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${PA_USER}.pythonanywhere.com")
          echo "Health check HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed — site returned $STATUS"
            exit 1
          fi
          echo "Site is live at https://${PA_USER}.pythonanywhere.com"
