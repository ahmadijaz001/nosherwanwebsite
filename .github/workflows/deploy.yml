name: Deploy to PythonAnywhere

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to PythonAnywhere
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull latest code on PythonAnywhere
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh.pythonanywhere.com
          username: ${{ secrets.PA_USERNAME }}
          key: ${{ secrets.PA_SSH_KEY }}
          port: 22
          timeout: 60s
          script: |
            set -e
            echo "=== Navigating to project ==="
            cd ~/nosherwanwebsite

            echo "=== Pulling latest code ==="
            git fetch origin
            git reset --hard origin/main

            echo "=== Installing dependencies ==="
            ~/nosherwanwebsite/venv/bin/pip install -q -r requirements.txt

            echo "=== Done ==="

      - name: Reload PythonAnywhere web app
        run: |
          echo "Reloading web app..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Token ${{ secrets.PA_API_TOKEN }}" \
            "https://www.pythonanywhere.com/api/v0/user/${{ secrets.PA_USERNAME }}/webapps/${{ secrets.PA_USERNAME }}.pythonanywhere.com/reload/")

          echo "API response code: $RESPONSE"

          if [ "$RESPONSE" = "200" ]; then
            echo "Web app reloaded successfully"
          else
            echo "Reload failed with status $RESPONSE"
            exit 1
          fi

      - name: Health check
        run: |
          sleep 8
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.PA_USERNAME }}.pythonanywhere.com/api/cars")
          echo "Health check status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Site is live and healthy"
          else
            echo "Warning: site returned $STATUS"
          fi

      - name: Summary
        if: success()
        run: |
          echo "Deployment complete"
          echo "Site: https://${{ secrets.PA_USERNAME }}.pythonanywhere.com"
          echo "Admin: https://${{ secrets.PA_USERNAME }}.pythonanywhere.com/admin"
          echo "Commit: ${{ github.sha }}"


#test           
